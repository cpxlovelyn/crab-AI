<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crabAI - 个人深度外脑</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column}
#header{padding:12px 16px;background:#161b22;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
#header h1{font-size:18px;color:#007AFF}
#header button:not(#user-menu-btn){background:#007AFF;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
#chat-container{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;line-height:1.6;font-size:14px}
.msg.user{align-self:flex-end;background:#007AFF;color:white}
.msg.ai{align-self:flex-start;background:#21262d;border:1px solid #30363d}
.msg.ai .block-title{color:#007AFF;font-weight:bold;margin:8px 0 4px}
.msg.ai .block-title:first-child{margin-top:0}
#progress-bar{display:none;height:3px;background:#007AFF;border-radius:2px;margin-bottom:8px;transition:width 0.3s}
#input-area{padding:12px 16px;background:#161b22;border-top:1px solid #30363d;display:flex;gap:8px;align-items:center}
#chat-input{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;color:#c9d1d9;font-size:14px;outline:none}
#chat-input::placeholder{color:#484f58}
#send-btn{background:#007AFF;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
#send-btn:disabled{background:#484f58;cursor:not-allowed}
#voice-btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:14px}
#voice-btn.recording{background:#da3633;color:white}
#facts-panel{display:none;position:fixed;top:0;right:0;width:320px;height:100vh;background:#161b22;border-left:1px solid #30363d;padding:16px;overflow-y:auto;z-index:100}
#facts-panel h2{font-size:16px;margin-bottom:12px;color:#007AFF}
.dim-card{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:12px}
.dim-card h3{color:#007AFF;font-size:14px;margin-bottom:8px}
.dim-card .tags{display:flex;flex-wrap:wrap;gap:6px}
.dim-card .tag{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-size:12px;color:#c9d1d9}
.close-btn{background:#007AFF;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:12px}
#export-btn,#import-btn,#change-key-btn{background:#007AFF;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-right:8px;margin-bottom:8px}
#overlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:99}
#key-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0d1117;z-index:1000;display:flex;flex-direction:column;justify-content:center;align-items:center}
#key-overlay h2{color:#007AFF;margin-bottom:16px}
#key-overlay p{color:#8b949e;margin-bottom:24px;font-size:14px;max-width:400px;text-align:center}
#api-key-input{width:400px;padding:12px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;margin-bottom:16px;font-size:14px}
#save-key-btn{background:#007AFF;color:white;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px}
#key-error{color:#da3633;margin-top:8px;font-size:12px;display:none}

#auth-modal{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.8);z-index:2000;justify-content:center;align-items:center}
#auth-modal.show{display:flex}
#auth-modal .modal-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:90%;max-width:360px}
#auth-modal h2{color:#007AFF;margin-bottom:20px;font-size:18px;text-align:center}
#auth-modal input{width:100%;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:12px;color:#c9d1d9;font-size:14px;margin-bottom:12px;outline:none}
#auth-modal input:focus{border-color:#007AFF}
#auth-modal input::placeholder{color:#484f58}
#auth-modal button{width:100%;background:#007AFF;color:white;border:none;padding:12px;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:12px}
#auth-modal .toggle-link{color:#007AFF;font-size:12px;text-align:center;cursor:pointer}
#auth-modal .error-msg{color:#da3633;font-size:12px;margin-bottom:12px;text-align:center;display:none}

#user-menu-btn{width:36px;height:36px;border-radius:50%;background:#007AFF;color:white;border:none;cursor:pointer;font-size:16px;padding:0;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-left:8px}
#user-menu{display:none;position:absolute;top:56px;right:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px;min-width:160px;z-index:500}
#user-menu.show{display:block}
#user-menu button{width:100%;background:none;color:#c9d1d9;border:none;padding:10px 12px;text-align:left;border-radius:6px;cursor:pointer;font-size:14px}
#user-menu button:hover{background:#21262d}
#user-menu .divider{height:1px;background:#30363d;margin:8px 0}

#dashboard{display:none;flex:1;overflow-y:auto;padding:20px}
#dashboard.show{display:block}
.dashboard-greeting{text-align:center;margin-bottom:24px}
.dashboard-greeting h2{font-size:24px;color:#007AFF;margin-bottom:8px}
.dashboard-greeting p{font-size:14px;color:#8b949e}
.dashboard-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:24px}
@media(min-width:768px){.dashboard-grid{grid-template-columns:repeat(3,1fr)}}
.dashboard-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px}
.dashboard-card h3{font-size:14px;color:#007AFF;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dashboard-card h3::before{content:'•';color:#007AFF}
.mood-chart{height:120px;display:flex;align-items:flex-end;justify-content:space-between;padding:8px 0}
.mood-bar{width:12%;background:#007AFF;border-radius:4px 4px 0 0;transition:height 0.3s}
.mood-bar.low{background:#484f58}
.mood-bar.medium{background:#F59E0B}
.mood-bar.high{background:#007AFF}
.todo-list{list-style:none;padding:0}
.todo-item{padding:8px 0;border-bottom:1px solid #30363d;font-size:13px;color:#c9d1d9}
.todo-item:last-child{border-bottom:none}
.achievement-list{list-style:none;padding:0}
.achievement-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #30363d;font-size:13px;color:#c9d1d9}
.achievement-item:last-child{border-bottom:none}
.achievement-item .badge{width:24px;height:24px;border-radius:50%;background:#F59E0B;color:#0d1117;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold}
#start-chat-btn{width:100%;background:#007AFF;color:white;border:none;padding:16px;border-radius:12px;cursor:pointer;font-size:16px;font-weight:bold;margin-top:auto}

#context-sidebar{display:none;position:fixed;top:50px;right:0;width:280px;height:calc(100vh - 120px);background:#161b22;border-left:1px solid #30363d;padding:12px;overflow-y:auto;z-index:50}
#context-sidebar.show{display:block}
.context-card{background:#21262d;border-radius:8px;padding:12px;margin-bottom:12px}
.context-card h4{font-size:12px;color:#007AFF;margin-bottom:8px}
.context-card p{font-size:12px;color:#c9d1d9;margin-bottom:4px}
.context-tags{display:flex;flex-wrap:wrap;gap:4px}
.context-tag{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:2px 6px;font-size:11px;color:#8b949e}

#memory-popup{display:none;position:fixed;top:50%;right:20px;transform:translateY(-50%);background:#161b22;border:1px solid #007AFF;border-radius:8px;padding:12px;min-width:250px;max-width:300px;z-index:200}
#memory-popup.show{display:block}
#memory-popup h4{font-size:12px;color:#007AFF;margin-bottom:8px}
#memory-popup ul{list-style:none;padding:0;margin:0}
#memory-popup li{font-size:12px;color:#c9d1d9;padding:4px 0;border-bottom:1px solid #30363d}
#memory-popup li:last-child{border-bottom:none}
#memory-popup .close-memory{position:absolute;top:4px;right:8px;color:#8b949e;cursor:pointer;font-size:14px}

#confirm-modal,#add-modal{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:3000;justify-content:center;align-items:center}
#confirm-modal.show,#add-modal.show{display:flex}
#confirm-modal .modal-content,#add-modal .modal-content{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:90%;max-width:320px}
#confirm-modal h3,#add-modal h3{color:#007AFF;margin-bottom:12px;font-size:16px;text-align:center}
#confirm-modal p{color:#c9d1d9;margin-bottom:20px;font-size:14px;text-align:center}
#add-modal input{width:100%;background:#0d1117;border:1px solid #007AFF;border-radius:8px;padding:12px;color:#c9d1d9;font-size:14px;margin-bottom:16px;outline:none}
#add-modal input::placeholder{color:#484f58}
.confirm-buttons{display:flex;gap:12px;justify-content:center}
.btn-ok{background:#007AFF;color:white;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px}
.btn-cancel{background:#30363d;color:#c9d1d9;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px}

.fact-item{position:relative;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:4px 24px 4px 8px;font-size:12px;color:#c9d1d9;margin-bottom:6px}
.fact-item .edit-btn{position:absolute;top:2px;right:2px;width:18px;height:18px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:12px;padding:0;display:flex;align-items:center;justify-content:center}
.fact-item .edit-btn:hover{color:#007AFF}
.fact-edit-box{background:#0d1117;border:1px solid #007AFF;border-radius:4px;padding:4px 8px;margin-bottom:6px}
.fact-edit-box textarea{width:100%;background:transparent;border:none;color:#c9d1d9;font-size:12px;resize:none;outline:none;font-family:inherit}
.fact-edit-actions{display:flex;gap:6px;margin-top:4px}
.fact-edit-actions .btn-save{background:#007AFF;color:white;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.fact-edit-actions .btn-cancel-edit{background:#30363d;color:#c9d1d9;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.fact-edit-actions .btn-delete{background:#da3633;color:white;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}

.add-fact-btn{background:none;border:1px dashed #007AFF;color:#007AFF;padding:8px 12px;border-radius:4px;cursor:pointer;font-size:12px;margin-top:8px;width:100%;text-align:left}
.add-fact-btn:hover{background:rgba(0,122,255,0.1)}
</style>
</head>
<body>
<div id="key-overlay">
<h2>欢迎使用 crabAI</h2>
<p>请输入你的 DeepSeek API Key<br>在 platform.deepseek.com 免费注册获取</p>
<input type="password" id="api-key-input" placeholder="sk-...">
<button id="save-key-btn">保存并开始</button>
<div id="key-error">Key格式错误，请以 sk- 开头</div>
</div>

<div id="auth-modal">
  <div class="modal-box">
    <h2 id="auth-title">登录</h2>
    <div id="auth-error" class="error-msg"></div>
    <input type="text" id="auth-username" placeholder="用户名">
    <input type="password" id="auth-password" placeholder="密码">
    <button id="auth-submit">登录</button>
    <div id="auth-toggle" class="toggle-link">还没有账号？点击注册</div>
  </div>
</div>

<div id="header">
<h1>crabAI</h1>
<div style="position:relative">
  <button id="facts-btn">事实档案</button>
  <button id="user-menu-btn">?</button>
  <div id="user-menu">
    <button id="menu-profile">个人档案</button>
    <button id="menu-settings">设置</button>
    <div class="divider"></div>
    <button id="menu-logout">退出登录</button>
  </div>
</div>
</div>

<div id="dashboard">
  <div class="dashboard-greeting">
    <h2 id="greeting-text">早安，朋友</h2>
    <p id="date-text">今天是一个新的开始</p>
  </div>
  <div class="dashboard-grid">
    <div class="dashboard-card">
      <h3>心情曲线</h3>
      <div class="mood-chart" id="mood-chart"></div>
    </div>
    <div class="dashboard-card">
      <h3>待关注事项</h3>
      <ul class="todo-list" id="todo-list"></ul>
    </div>
    <div class="dashboard-card">
      <h3>最近成就</h3>
      <ul class="achievement-list" id="achievement-list"></ul>
    </div>
  </div>
  <button id="start-chat-btn">开始对话</button>
</div>

<div id="chat-container"></div>
<div id="context-sidebar"></div>
<div id="memory-popup">
  <span class="close-memory" id="close-memory">×</span>
  <h4>相关记忆</h4>
  <ul id="memory-list"></ul>
</div>
<div id="input-area">
<button id="voice-btn">语音</button>
<input type="text" id="chat-input" placeholder="输入消息或点击语音...">
<button id="send-btn">发送</button>
</div>
<div id="overlay"></div>
<div id="confirm-modal">
  <div class="modal-content">
    <h3 id="confirm-title">确认修改</h3>
    <p id="confirm-message">确定保存修改吗？</p>
    <div class="confirm-buttons">
      <button id="confirm-cancel" class="btn-cancel">否</button>
      <button id="confirm-ok" class="btn-ok">是</button>
    </div>
  </div>
</div>
<div id="add-modal">
  <div class="modal-content">
    <h3 id="add-title">新增条目</h3>
    <input type="text" id="add-input" placeholder="输入条目内容..." />
    <div class="confirm-buttons">
      <button id="add-cancel" class="btn-cancel">取消</button>
      <button id="add-ok" class="btn-ok">确定</button>
    </div>
  </div>
</div>
<div id="facts-panel">
<button class="close-btn" id="close-facts">关闭</button>
<h2>个人档案</h2>
<button id="export-btn">导出档案</button>
<button id="import-btn">导入档案</button>
<input type="file" id="import-file" accept=".json" style="display:none">
<div id="facts-content"></div>
<button id="change-key-btn">更换 API Key</button>
</div>

<script>
// ========== 配置 ==========
const API_URL = 'https://api.deepseek.com/v1/chat/completions';
const CHAT_MODEL = 'deepseek-reasoner';
const EXTRACT_MODEL = 'deepseek-chat';

// ========== 四大维度 ==========
const DIMENSIONS = {
  emotion: '情感关系',
  study: '学业知识',
  career: '事业规划',
  life: '生活日常'
};

// ========== DOM 元素 ==========
const keyOverlay = document.getElementById('key-overlay');
const apiKeyInput = document.getElementById('api-key-input');
const saveKeyBtn = document.getElementById('save-key-btn');
const keyError = document.getElementById('key-error');
const chatContainer = document.getElementById('chat-container');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const voiceBtn = document.getElementById('voice-btn');
const inputArea = document.getElementById('input-area');
const factsBtn = document.getElementById('facts-btn');
const factsPanel = document.getElementById('facts-panel');
const factsContent = document.getElementById('facts-content');
const closeFacts = document.getElementById('close-facts');
const overlay = document.getElementById('overlay');
const exportBtn = document.getElementById('export-btn');
const importBtn = document.getElementById('import-btn');
const importFile = document.getElementById('import-file');
const changeKeyBtn = document.getElementById('change-key-btn');

const authModal = document.getElementById('auth-modal');
const authTitle = document.getElementById('auth-title');
const authError = document.getElementById('auth-error');
const authUsername = document.getElementById('auth-username');
const authPassword = document.getElementById('auth-password');
const authSubmit = document.getElementById('auth-submit');
const authToggle = document.getElementById('auth-toggle');
const userMenuBtn = document.getElementById('user-menu-btn');
const userMenu = document.getElementById('user-menu');
const dashboard = document.getElementById('dashboard');
const greetingText = document.getElementById('greeting-text');
const dateText = document.getElementById('date-text');
const moodChart = document.getElementById('mood-chart');
const todoList = document.getElementById('todo-list');
const achievementList = document.getElementById('achievement-list');
const startChatBtn = document.getElementById('start-chat-btn');
const contextSidebar = document.getElementById('context-sidebar');
const memoryPopup = document.getElementById('memory-popup');
const memoryList = document.getElementById('memory-list');
const closeMemory = document.getElementById('close-memory');

let isLoginMode = true;
let currentUser = null;
let isChatMode = false;

// ========== 获取 API Key ==========
function getApiKey() {
  return localStorage.getItem('crabAI_api_key') || '';
}

// ========== 账号体系 ==========
function generateUserId() {
  return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
}

function getUsers() {
  const users = localStorage.getItem('crabAI_users');
  return users ? JSON.parse(users) : {};
}

function saveUsers(users) {
  localStorage.setItem('crabAI_users', JSON.stringify(users));
}

function getCurrentUser() {
  const token = localStorage.getItem('crabAI_token');
  const isLoggedIn = localStorage.getItem('crabAI_isLoggedIn');
  if (token && isLoggedIn === 'true') {
    const users = getUsers();
    return users[token] || null;
  }
  return null;
}

function login(username, password) {
  try {
    const users = getUsers();
    for (const token in users) {
      if (users[token].username === username && users[token].password === btoa(password)) {
        localStorage.setItem('crabAI_token', token);
        localStorage.setItem('crabAI_isLoggedIn', 'true');
        currentUser = users[token];
        updateUserMenuBtn();
        loadUserProfile();
        renderDashboard();
        showDashboard();
        return true;
      }
    }
    return false;
  } catch(e) {
    console.error('登录失败', e);
    return false;
  }
}

function register(username, password) {
  try {
    const users = getUsers();
    for (const token in users) {
      if (users[token].username === username) {
        return false;
      }
    }
    const userId = generateUserId();
    const token = 'token_' + Date.now();
    users[token] = {
      userId: userId,
      username: username,
      password: btoa(password),
      createdAt: Date.now()
    };
    saveUsers(users);
    localStorage.setItem('crabAI_token', token);
    localStorage.setItem('crabAI_isLoggedIn', 'true');
    currentUser = users[token];
    updateUserMenuBtn();
    initUserProfile();
    renderDashboard();
    showDashboard();
    return true;
  } catch(e) {
    console.error('注册失败', e);
    return false;
  }
}

function logout() {
  localStorage.removeItem('crabAI_token');
  localStorage.removeItem('crabAI_isLoggedIn');
  currentUser = null;
  updateUserMenuBtn();
  userMenu.classList.remove('show');
  loadUserProfile();
  dashboard.classList.remove('show');
  chatContainer.style.display = 'flex';
  inputArea.style.display = 'flex';
  contextSidebar.classList.remove('show');
}

function updateUserMenuBtn() {
  if (currentUser) {
    userMenuBtn.textContent = currentUser.username.charAt(0).toUpperCase();
  } else {
    userMenuBtn.textContent = '?';
  }
}

function getProfileKey() {
  if (currentUser) {
    return 'crabAI_profile_' + currentUser.userId;
  }
  return 'crabAI_dims';
}

function initUserProfile() {
  const profileKey = getProfileKey();
  if (!localStorage.getItem(profileKey)) {
    localStorage.setItem(profileKey, JSON.stringify({emotion:[], study:[], career:[], life:[]}));
  }
}

function loadUserProfile() {
  const profileKey = getProfileKey();
  const savedFacts = localStorage.getItem(profileKey);
  if (savedFacts) {
    try {
      facts = JSON.parse(savedFacts);
    } catch(e) {
      facts = {emotion:[], study:[], career:[], life:[]};
    }
  } else {
    facts = {emotion:[], study:[], career:[], life:[]};
  }
  renderFacts();
}

function saveUserProfile() {
  const profileKey = getProfileKey();
  localStorage.setItem(profileKey, JSON.stringify(facts));
}

// ========== 仪表盘渲染 ==========
function getGreeting() {
  const hour = new Date().getHours();
  let greeting = '';
  if (hour < 6) greeting = '夜深了';
  else if (hour < 9) greeting = '早安';
  else if (hour < 12) greeting = '上午好';
  else if (hour < 14) greeting = '中午好';
  else if (hour < 18) greeting = '下午好';
  else greeting = '晚上好';
  
  const nickname = currentUser ? currentUser.username : '朋友';
  return greeting + '，' + nickname;
}

function getDateText() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const day = now.getDate();
  const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  const weekDay = weekDays[now.getDay()];
  
  let focusText = '';
  const recentFacts = facts.study.concat(facts.career).slice(-3);
  if (recentFacts.length > 0) {
    focusText = ' · 近期关注：' + recentFacts[0].substring(0, 20) + '...';
  }
  
  return '今天是 ' + month + '月' + day + '日 ' + weekDay + focusText;
}

function renderMoodChart() {
  moodChart.innerHTML = '';
  const days = ['一', '二', '三', '四', '五', '六', '日'];
  const moodRecords = [];
  let hasData = false;
  
  for (let i = 6; i >= 0; i--) {
    const date = new Date();
    date.setDate(date.getDate() - i);
    const dateStr = date.toISOString().split('T')[0];
    const mood = localStorage.getItem('crabAI_mood_' + dateStr);
    if (mood) {
      moodRecords.push({dateStr: dateStr, mood: parseFloat(mood), dayLabel: days[6-i]});
      hasData = true;
    }
  }
  
  const diaryRecords = localStorage.getItem('crabAI_diary_records');
  if (diaryRecords) {
    try {
      const diaryData = JSON.parse(diaryRecords);
      if (diaryData.length > 0) hasData = true;
    } catch(e) {}
  }
  
  if (!hasData) {
    const emptyState = document.createElement('div');
    emptyState.style.display = 'flex';
    emptyState.style.flexDirection = 'column';
    emptyState.style.alignItems = 'center';
    emptyState.style.justifyContent = 'center';
    emptyState.style.height = '120px';
    emptyState.style.textAlign = 'center';
    
    const text = document.createElement('p');
    text.textContent = '📖 暂无心情记录，开始第一次语音日记吧';
    text.style.color = '#8b949e';
    text.style.fontSize = '13px';
    text.style.marginBottom = '12px';
    
    const recordBtn = document.createElement('button');
    recordBtn.textContent = '🎤 去记录';
    recordBtn.style.background = '#007AFF';
    recordBtn.style.color = 'white';
    recordBtn.style.border = 'none';
    recordBtn.style.padding = '8px 16px';
    recordBtn.style.borderRadius = '8px';
    recordBtn.style.cursor = 'pointer';
    recordBtn.style.fontSize = '13px';
    
    recordBtn.addEventListener('click', function() {
      showChat();
      setTimeout(function() {
        voiceBtn.click();
      }, 300);
    });
    
    emptyState.appendChild(text);
    emptyState.appendChild(recordBtn);
    moodChart.appendChild(emptyState);
    return;
  }
  
  if (moodRecords.length === 0) {
    const emptyState = document.createElement('div');
    emptyState.style.display = 'flex';
    emptyState.style.flexDirection = 'column';
    emptyState.style.alignItems = 'center';
    emptyState.style.justifyContent = 'center';
    emptyState.style.height = '120px';
    emptyState.style.textAlign = 'center';
    
    const text = document.createElement('p');
    text.textContent = '📖 暂无心情记录，开始第一次语音日记吧';
    text.style.color = '#8b949e';
    text.style.fontSize = '13px';
    text.style.marginBottom = '12px';
    
    const recordBtn = document.createElement('button');
    recordBtn.textContent = '🎤 去记录';
    recordBtn.style.background = '#007AFF';
    recordBtn.style.color = 'white';
    recordBtn.style.border = 'none';
    recordBtn.style.padding = '8px 16px';
    recordBtn.style.borderRadius = '8px';
    recordBtn.style.cursor = 'pointer';
    recordBtn.style.fontSize = '13px';
    
    recordBtn.addEventListener('click', function() {
      showChat();
      setTimeout(function() {
        voiceBtn.click();
      }, 300);
    });
    
    emptyState.appendChild(text);
    emptyState.appendChild(recordBtn);
    moodChart.appendChild(emptyState);
    return;
  }
  
  moodRecords.forEach(function(item) {
    const bar = document.createElement('div');
    bar.className = 'mood-bar';
    const height = item.mood * 100;
    bar.style.height = height + '%';
    if (height < 40) bar.classList.add('low');
    else if (height < 70) bar.classList.add('medium');
    else bar.classList.add('high');
    moodChart.appendChild(bar);
    
    const label = document.createElement('div');
    label.style.fontSize = '10px';
    label.style.color = '#8b949e';
    label.style.textAlign = 'center';
    label.textContent = item.dayLabel;
    bar.appendChild(label);
  });
}

function findRelatedFacts(text) {
  const related = [];
  const textLower = text.toLowerCase();
  
  Object.keys(facts).forEach(function(key) {
    facts[key].forEach(function(fact) {
      if (fact.toLowerCase().includes(textLower) && related.length < 5) {
        related.push(fact);
      }
    });
  });
  
  return related;
}

// ========== 数据存储 ==========
let messages = [];
let facts = {emotion:[], study:[], career:[], life:[]};

// ========== 旧数据迁移 ==========
function migrateOldData() {
  const oldFacts = localStorage.getItem('crabAI_facts');
  if (oldFacts) {
    try {
      const old = JSON.parse(oldFacts);
      for (let key in old) {
        facts.life.push(key + ': ' + old[key]);
      }
      saveFacts();
      localStorage.removeItem('crabAI_facts');
      alert('旧数据已迁移，建议立即导出备份');
    } catch(e) {
      console.log('迁移失败', e);
    }
  }
  const oldMessages = localStorage.getItem('crabAI_messages');
  if (oldMessages) {
    try {
      messages = JSON.parse(oldMessages);
    } catch(e) {
      messages = [];
    }
  }
}

// ========== 保存 ==========
function saveMessages() {
  localStorage.setItem('crabAI_messages', JSON.stringify(messages));
}

function saveFacts() {
  saveUserProfile();
}

// ========== 渲染消息 ==========
function renderMessages() {
  chatContainer.innerHTML = '';
  messages.forEach(function(msg) {
    addMessageToDOM(msg.role, msg.content);
  });
  scrollToBottom();
}

function addMessageToDOM(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'ai') {
    let html = content
      .replace(/=== 区块一：深度叙事与分析 ===/g, '<div class="block-title">深度叙事与分析</div>')
      .replace(/=== 区块二：核心逻辑推演 ===/g, '<div class="block-title">核心逻辑推演</div>')
      .replace(/\n/g, '<br>');
    div.innerHTML = html;
  } else {
    div.textContent = content;
  }
  chatContainer.appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// ========== 流式输出 ==========
async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  const API_KEY = getApiKey();
  if (!API_KEY) {
    alert('请先输入 API Key');
    keyOverlay.style.display = 'flex';
    return;
  }

  messages.push({role:'user', content:text});
  addMessageToDOM('user', text);
  chatInput.value = '';
  sendBtn.disabled = true;
  voiceBtn.disabled = true;

  const aiDiv = document.createElement('div');
  aiDiv.className = 'msg ai';
  const progressBar = document.createElement('div');
  progressBar.id = 'progress-bar';
  progressBar.style.display = 'block';
  progressBar.style.width = '0%';
  aiDiv.appendChild(progressBar);
  const contentDiv = document.createElement('div');
  contentDiv.className = 'ai-content';
  aiDiv.appendChild(contentDiv);
  chatContainer.appendChild(aiDiv);
  scrollToBottom();

  const factsText = JSON.stringify(facts);
  let sysPrompt = '你是蟹蟹，一位极度深度的多学科心理与逻辑分析师，也是用户的专属个人外脑。' +
    '【底层思维操作系统 - 每次回复必须调用】' +
    '1. 真实错误模拟器：直接进实战场景，出错后通过提问让自己发现错误，试错至少2次再揭露答案，重复到自信作答。' +
    '2. 困惑破解者：先给钥匙句用日常类比讲，别用术语，再问3个理解才能答对的问题，全对才继续。' +
    '3. 定制学习路径：明确目标、技能、期限、成果和已有基础，要7天计划，每天45分钟任务、完成标准和避坑点，达不成目标就改。' +
    '4. 隐藏漏洞检测器：觉得掌握技能后，被问5个戳穿浅尝辄止的问题，每个答案指出知识盲点，只懂皮毛就直说。' +
    '5. 严苛进度镜像：监督长期进步，对比每次回复，说明是真进步还是重复错误，停滞就直言，只表扬真实可测进步。' +
    '6. 最坏情景教练：学技能时模拟高压无教材场景，直接进入后指出失败点和需训练的地方。' +
    '7. 思维捷径检查员：解决问题后审查思考过程，用捷径、死记硬背或碰运气就重来，要能说出每步为什么才算掌握。' +
    '8. 反向教学模拟器：假装学生被教技能，问简单问题，每用术语就要例子，讲错时顺着错逻辑推导到荒谬结论，直到解释自洽。' +
    '【领域专家模式】' +
    '输出领域专家认同的5个核心思维模式、专家争论最凶的3个方面及论据、出10道能区分理解与死记硬背的题，死磕题目改进。' +
    '【顶级专家指令】' +
    '准确胜过讨好，直接敢于争辩，先讲反方观点，没有新证据不轻易让步。' +
    '给每个判断打标签：KNOWN训练事实、COMPUTED计算得出、INFERRED推论、COMMON通用知识、FRAME符号体系、GUESS没有根据。' +
    '置信度：HIGH80%以上、MED50-80%、LOW20-50%、VERY LOW20%以下、UNKNOWN无法判断。' +
    '不知道就写我不知道。反谄媚：不漂亮、不解释一切、不立刻同意、不制造权威感。事后解释标记为INFERRED,post-hoc。' +
    '【开场白规则】' +
    '如果这是第一次对话或长时间未对话，开场白必须引用用户档案中的具体内容，禁止使用通用问候语。' +
    '例如：如果档案中有"正在学习英语"，要说"嘿！记得你在学习英语，今天有什么进展吗？"而不是"你好！"。' +
    '已知用户档案：' + factsText + '。' +
    '请严格按以下格式输出（绝对禁止用Markdown符号如#*_`）：' +
    '=== 区块一：深度叙事与分析 ===（共情、细腻、层层递进的深层心理剖析）' +
    '=== 区块二：核心逻辑推演 ===（极度理性的因果推导、行为预测、理论验证）';

  const requestMsgs = [{role:'system', content:sysPrompt}];
  messages.forEach(function(m) { requestMsgs.push(m); });

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: CHAT_MODEL,
        messages: requestMsgs,
        stream: true
      })
    });

    if (!res.ok) {
      throw new Error('API错误: ' + res.status);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let progress = 0;

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, {stream:true});
      const lines = chunk.split('\n');

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line || !line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') continue;

        try {
          const json = JSON.parse(data);
          const delta = json.choices[0].delta.content;
          if (delta) {
            fullText += delta;
            progress = Math.min(progress + 2, 95);
            progressBar.style.width = progress + '%';

            let html = fullText
              .replace(/=== 区块一：深度叙事与分析 ===/g, '<div class="block-title">深度叙事与分析</div>')
              .replace(/=== 区块二：核心逻辑推演 ===/g, '<div class="block-title">核心逻辑推演</div>')
              .replace(/\n/g, '<br>');
            contentDiv.innerHTML = html;
            scrollToBottom();
          }
        } catch(e) {
          // 忽略解析错误
        }
      }
    }

    progressBar.style.width = '100%';
    setTimeout(function() {
      progressBar.style.display = 'none';
    }, 500);

    messages.push({role:'assistant', content:fullText});
    saveMessages();
    extractFacts(text, fullText);
    
    renderContextSidebar(text);
    
    const relatedFacts = findRelatedFacts(text);
    if (relatedFacts.length > 0) {
      showMemoryPopup(relatedFacts);
      setTimeout(hideMemoryPopup, 8000);
    }

  } catch(err) {
    contentDiv.textContent = '出错了: ' + err.message;
    progressBar.style.display = 'none';
  } finally {
    sendBtn.disabled = false;
    voiceBtn.disabled = false;
  }
}

// ========== 提取事实到四大维度 ==========
async function extractFacts(userText, aiReply) {
  const API_KEY = getApiKey();
  if (!API_KEY) return;

  const extractPrompt = '从以下对话中提取关键事实，分类到四个维度，返回纯JSON格式（不要任何其他文字）：' +
    '{"情感关系":["事实1","事实2"], "学业知识":[], "事业规划":[], "生活日常":[]}。' +
    '用户说：' + userText + '。AI回复：' + aiReply;

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: EXTRACT_MODEL,
        messages: [{role:'user', content:extractPrompt}],
        stream: false
      })
    });

    if (!res.ok) return;

    const data = await res.json();
    const text = data.choices[0].message.content;

    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (jsonMatch) {
      const newFacts = JSON.parse(jsonMatch[0]);
      for (let dim in newFacts) {
        const key = Object.keys(DIMENSIONS).find(function(k) {
          return DIMENSIONS[k] === dim;
        });
        if (key && Array.isArray(newFacts[dim])) {
          newFacts[dim].forEach(function(fact) {
            if (fact && facts[key].indexOf(fact) === -1) {
              facts[key].push(fact);
            }
          });
        }
      }
      saveFacts();
      renderFacts();
    }
  } catch(e) {
    console.log('提取事实失败', e);
  }
}

// ========== 渲染事实档案 ==========
function renderFacts() {
  factsContent.innerHTML = '';
  const emptyMessages = {
    emotion: '暂无情感关系记录',
    study: '暂无学业知识记录',
    career: '暂无事业规划记录',
    life: '暂无生活日常记录'
  };
  
  for (let key in DIMENSIONS) {
    const card = document.createElement('div');
    card.className = 'dim-card';
    const title = document.createElement('h3');
    title.textContent = DIMENSIONS[key];
    card.appendChild(title);
    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'tags';
    
    if (facts[key] && facts[key].length > 0) {
      facts[key].forEach(function(fact, index) {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'fact-item';
        itemDiv.textContent = fact;
        
        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.textContent = '✏';
        editBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          enterEditMode(key, index, fact, itemDiv);
        });
        
        itemDiv.appendChild(editBtn);
        tagsDiv.appendChild(itemDiv);
      });
    } else {
      const emptyText = document.createElement('span');
      emptyText.className = 'tag';
      emptyText.textContent = emptyMessages[key] || '暂无记录';
      emptyText.style.opacity = '0.5';
      tagsDiv.appendChild(emptyText);
    }
    
    const addBtn = document.createElement('button');
    addBtn.className = 'add-fact-btn';
    addBtn.textContent = '+ 新增条目';
    addBtn.addEventListener('click', function() {
      openAddModal(key);
    });
    tagsDiv.appendChild(addBtn);
    
    card.appendChild(tagsDiv);
    factsContent.appendChild(card);
  }
}

function enterEditMode(dimKey, index, originalText, itemDiv) {
  const editBox = document.createElement('div');
  editBox.className = 'fact-edit-box';
  
  const textarea = document.createElement('textarea');
  textarea.rows = 2;
  textarea.value = originalText;
  
  const actions = document.createElement('div');
  actions.className = 'fact-edit-actions';
  
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-save';
  saveBtn.textContent = '保存';
  saveBtn.addEventListener('click', function() {
    const newText = textarea.value.trim();
    if (newText && newText !== originalText) {
      showConfirmModal('确认修改', '确定保存对【' + DIMENSIONS[dimKey] + '】的修改吗？', function() {
        facts[dimKey][index] = newText;
        saveFacts();
        renderFacts();
      }, function() {
        renderFacts();
      });
    } else {
      renderFacts();
    }
  });
  
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-cancel-edit';
  cancelBtn.textContent = '取消';
  cancelBtn.addEventListener('click', function() {
    renderFacts();
  });
  
  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn-delete';
  deleteBtn.textContent = '删除';
  deleteBtn.addEventListener('click', function() {
    showConfirmModal('确认删除', '确定删除这条记录吗？', function() {
      facts[dimKey].splice(index, 1);
      saveFacts();
      renderFacts();
    });
  });
  
  actions.appendChild(saveBtn);
  actions.appendChild(cancelBtn);
  actions.appendChild(deleteBtn);
  editBox.appendChild(textarea);
  editBox.appendChild(actions);
  
  itemDiv.parentNode.replaceChild(editBox, itemDiv);
  
  setTimeout(function() {
    textarea.focus();
    textarea.select();
  }, 50);
}

// ========== 确认弹窗 ==========
let confirmCallback = null;

function showConfirmModal(title, message, onConfirm, onCancel) {
  const modal = document.getElementById('confirm-modal');
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-message').textContent = message;
  confirmCallback = onConfirm;
  
  modal.classList.add('show');
  
  const okBtn = document.getElementById('confirm-ok');
  const cancelBtn = document.getElementById('confirm-cancel');
  
  okBtn.onclick = function() {
    modal.classList.remove('show');
    if (confirmCallback) confirmCallback();
    confirmCallback = null;
  };
  
  cancelBtn.onclick = function() {
    modal.classList.remove('show');
    if (onCancel) onCancel();
    confirmCallback = null;
  };
}

// ========== 新增条目 ==========
let currentAddDimKey = null;

function openAddModal(dimKey) {
  currentAddDimKey = dimKey;
  const modal = document.getElementById('add-modal');
  const input = document.getElementById('add-input');
  input.value = '';
  modal.classList.add('show');
  
  setTimeout(function() {
    input.focus();
  }, 50);
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('show');
  currentAddDimKey = null;
}

document.getElementById('add-ok').addEventListener('click', function() {
  const input = document.getElementById('add-input');
  const text = input.value.trim();
  
  if (text && currentAddDimKey) {
    facts[currentAddDimKey].push(text);
    saveFacts();
    renderFacts();
  }
  
  closeAddModal();
});

document.getElementById('add-cancel').addEventListener('click', closeAddModal);

document.getElementById('add-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    document.getElementById('add-ok').click();
  }
});

// ========== 导出档案 ==========
function exportFacts() {
  const profileKey = getProfileKey();
  const data = localStorage.getItem(profileKey);
  if (!data) {
    alert('暂无档案可导出');
    return;
  }
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const timestamp = new Date().toISOString().slice(0,19).replace(/:/g,'-');
  a.download = 'crabAI_backup_' + timestamp + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ========== 导入档案 ==========
function importFacts() {
  importFile.click();
}

importFile.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const json = JSON.parse(event.target.result);
      if (Array.isArray(json.emotion) && Array.isArray(json.study) && 
          Array.isArray(json.career) && Array.isArray(json.life)) {
        facts = json;
        saveUserProfile();
        renderFacts();
        alert('档案导入成功');
      } else {
        alert('档案格式错误');
      }
    } catch(err) {
      alert('档案格式错误');
    }
  };
  reader.onerror = function() {
    alert('读取文件失败');
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ========== 语音输入 ==========
function setupVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    voiceBtn.style.display = 'none';
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;

  voiceBtn.addEventListener('click', function() {
    if (voiceBtn.classList.contains('recording')) {
      recognition.stop();
      voiceBtn.classList.remove('recording');
      voiceBtn.textContent = '语音';
    } else {
      recognition.start();
      voiceBtn.classList.add('recording');
      voiceBtn.textContent = '停止';
    }
  });

  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript;
    chatInput.value = transcript;
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '语音';
  };

  recognition.onerror = function() {
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '语音';
  };

  recognition.onend = function() {
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '语音';
  };
}
